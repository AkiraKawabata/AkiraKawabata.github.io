<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}" class="no-js">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>document.documentElement.classList.replace('no-js', 'js');</script>

    {% seo %}
    {% if site.keywords %}<meta name="keywords" content="{{ site.keywords }}">{% endif %}
    <meta name="robots" content="index,follow">

    <link rel="icon" media="(prefers-color-scheme:dark)" href="{{ site.favicon_dark | replace: './', '/' | relative_url }}" type="image/png" />
    <link rel="icon" media="(prefers-color-scheme:light)" href="{{ site.favicon | replace: './', '/' | relative_url }}" type="image/png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600&family=Inter:wght@300;400;500&family=Geist+Mono:wght@300;400;500&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ '/assets/css/editorial.css' | relative_url }}">
  </head>
  <body>
    <div class="eg-root">
      {% include eg-nav.html %}
      <main>
        {{ content }}
      </main>
      {% include eg-footer.html %}
    </div>

    <script src="{{ '/assets/js/favicon-switcher.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/interactions.js' | relative_url }}"></script>

    {% if site.google_analytics %}
    <script>
      (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
      (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
      m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
      })(window,document,'script','https://www.google-analytics.com/analytics.js','ga');
      ga('create', '{{ site.google_analytics }}', 'auto');
      ga('send', 'pageview');
    </script>
    {% endif %}
  </body>
</html>
